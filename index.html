<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novedades Live | EOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] } } } }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="flex flex-col h-screen overflow-hidden bg-slate-100/70 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 antialiased selection:bg-indigo-500 selection:text-white">

    <!-- HEADER CON DISEÑO GLASSMORPHISM -->
    <header class="glass-header bg-white/85 dark:bg-slate-900/85 px-6 pt-6 pb-4 shadow-sm z-50 shrink-0 border-b border-slate-200/80 dark:border-slate-800/80 transition-colors duration-300 sticky top-0">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center text-white shadow-md shadow-indigo-500/20 font-black text-lg">
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white flex items-center gap-2">
                        Logística<span class="bg-indigo-100 dark:bg-indigo-950/70 text-indigo-700 dark:text-indigo-300 text-[10px] font-black uppercase px-2 py-0.5 rounded-full border border-indigo-200 dark:border-indigo-800">EOR</span>
                    </h1>
                    <p class="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-0.5">Alertas & Operaciones en Tiempo Real</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2.5">
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800/80 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white hover:bg-slate-200/70 dark:hover:bg-slate-700/80 transition-all focus:outline-none border border-slate-200/60 dark:border-slate-700/60 active:scale-95 shadow-sm" title="Alternar Modo Oscuro">
                    <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>

                <div id="auth-container"></div>
            </div>
        </div>
        
        <div class="mt-4 flex bg-slate-200/60 dark:bg-slate-900/90 p-1 rounded-xl shadow-inner w-full sm:w-auto max-w-md mx-auto border border-slate-300/40 dark:border-slate-800/80">
            <button onclick="cambiarVista('pendientes')" id="btn-pendientes" class="flex-1 py-2 bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 font-extrabold text-xs rounded-lg shadow-sm transition-all duration-200 flex items-center justify-center gap-1.5">
                <span></span> Pendientes
            </button>
            <button onclick="cambiarVista('resueltos')" id="btn-resueltos" class="flex-1 py-2 text-slate-500 dark:text-slate-400 font-bold text-xs hover:text-slate-700 dark:hover:text-slate-200 transition-all duration-200 flex items-center justify-center gap-1.5">
                <span>✅</span> Resueltos
            </button>
        </div>
    </header>

    <!-- MAIN CONTAINER SIN SCROLLBAR VISIBLE -->
    <main id="feed-container" class="flex-1 overflow-y-auto custom-scrollbar p-5 pb-32 max-w-7xl mx-auto w-full">
        <div class="flex justify-center items-center h-40"><span class="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full"></span></div>
    </main>

    <!-- BOTÓN ACCIÓN FLOTANTE (FAB) -->
    <button onclick="abrirModalNueva()" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-tr from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white rounded-2xl shadow-lg shadow-indigo-600/30 flex justify-center items-center active:scale-90 transition-all duration-200 z-50 border border-indigo-400/30 group">
        <svg class="w-6 h-6 transform group-hover:rotate-90 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
    </button>

    <!-- MODAL REPORTAR NOVEDAD -->
    <div id="modal-nueva" class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-[100] hidden flex flex-col justify-end transition-opacity opacity-0 duration-200">
        <div class="bg-white dark:bg-slate-900 w-full md:w-[500px] md:mx-auto md:mb-6 rounded-t-3xl md:rounded-3xl shadow-2xl transform translate-y-full transition-transform duration-250 ease-out max-h-[90vh] flex flex-col border border-slate-200/80 dark:border-slate-800/80" id="modal-content">
            <div class="flex justify-between items-center p-5 border-b border-slate-100 dark:border-slate-800 shrink-0">
                <div class="flex items-center gap-2">
                    <span class="text-xl">📋</span>
                    <h2 class="text-lg font-black text-slate-900 dark:text-white">Reportar Novedad</h2>
                </div>
                <button onclick="cerrarModalNueva()" class="p-2 bg-slate-100 dark:bg-slate-800 text-slate-400 hover:text-slate-700 dark:hover:text-white rounded-xl transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            
            <form onsubmit="enviarNovedad(event)" class="p-5 flex-1 overflow-y-auto flex flex-col gap-4 custom-scrollbar">
                
                <div class="relative">
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Buscar Conductor</label>
                    <input type="text" id="input-nom" placeholder="Escriba nombre o tractor..." class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none uppercase shadow-sm transition-all" autocomplete="off" oninput="filtrarChoferes('nom')" onfocus="filtrarChoferes('nom')" required>
                    
                    <div id="dropdown-choferes" class="hidden absolute z-50 w-full mt-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-2xl max-h-60 overflow-y-auto custom-scrollbar"></div>
                </div>
                
                <input type="hidden" id="input-ute">
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Tractor</label>
                        <input type="text" id="input-tractor" placeholder="Dominio" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 uppercase outline-none focus:ring-2 focus:ring-indigo-500 transition-all" autocomplete="off" oninput="filtrarChoferes('tractor')" onfocus="filtrarChoferes('tractor')">
                        <div id="dropdown-tractores" class="hidden absolute z-50 w-full mt-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-2xl max-h-60 overflow-y-auto custom-scrollbar"></div>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Servicio</label>
                        <select id="input-srv" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 outline-none appearance-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                            <option value="LIVIANO">LIVIANO</option><option value="METANOL">METANOL</option><option value="YPF">YPF</option><option value="S/A">OTRO</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Clasificación</label>
                    <select id="input-tipo" onchange="adaptarFormulario(this.value)" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 outline-none appearance-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer" required>
                        <option value="" disabled selected>Seleccionar clasificación...</option>
                        <option value="LIBRES">🩵 Libres</option>
                        <option value="BAJA_DIAGRAMA">📅 Baja / Término de Diagrama</option>
                        <option value="CERTIFICACION_UNIDAD">🚚 Certificación de Unidad</option>
                        <option value="EXAMEN_CHOFER">🩺 Exámenes / Vencimientos</option>
                        <option value="REPARACION">🔧 Reparación Requerida</option>
                    </select>
                </div>

                <div id="div-fecha">
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Fecha Objetivo / Venc. <span class="text-slate-400 font-normal lowercase">(opcional)</span></label>
                    <input type="date" id="input-fecha" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Detalle / Notas</label>
                    <textarea id="input-detalle" rows="3" placeholder="Describa el requerimiento..." class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-medium text-slate-800 dark:text-slate-200 outline-none resize-none focus:ring-2 focus:ring-indigo-500 transition-all"></textarea>
                </div>

                <button type="submit" id="btn-submit" disabled class="mt-2 w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-extrabold text-xs uppercase tracking-widest p-4 rounded-xl shadow-lg shadow-indigo-600/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:from-indigo-600 disabled:hover:to-violet-600 active:scale-[0.98] disabled:active:scale-100">
                    Publicar Novedad
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // 👉 INICIALIZACIÓN MODO OSCURO
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('icon-moon').classList.add('hidden');
            document.getElementById('icon-sun').classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            document.getElementById('icon-moon').classList.toggle('hidden', isDark);
            document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
        }
    </script>
    
    <!-- Carga ordenada de módulos para escalabilidad -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/feed.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/socket.js"></script>
</body>
</html>
