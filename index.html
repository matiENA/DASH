<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novedades Live | EOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] } } } }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; }
        
        /* 🚫 OCULTAR BARRAS DE SCROLL EN TODO EL SITIO */
        ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        .custom-scrollbar::-webkit-scrollbar { display: none !important; }
        .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ⚡ ANIMACIÓN ULTRA RÁPIDA DE SALIDA AL BORDE DE PANTALLA */
        .fade-out {
            opacity: 0 !important;
            transform: translateX(120px) scale(0.92) rotate(1.5deg) !important;
            transition: transform 0.15s cubic-bezier(0.4, 0, 1, 1), opacity 0.12s ease-out !important;
            pointer-events: none;
        }

        /* Ecosistema visual extra */
        .glass-header {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .glow-accent {
            box-shadow: 0 0 25px -5px rgba(99, 102, 241, 0.25);
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-slate-100/70 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 antialiased selection:bg-indigo-500 selection:text-white">

    <!-- HEADER CON DISEÑO GLASSMORPHISM -->
    <header class="glass-header bg-white/85 dark:bg-slate-900/85 px-6 pt-6 pb-4 shadow-sm z-50 shrink-0 border-b border-slate-200/80 dark:border-slate-800/80 transition-colors duration-300 sticky top-0">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center text-white shadow-md shadow-indigo-500/20 font-black text-lg">
                    ⚡
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white flex items-center gap-2">
                        Live Feed <span class="bg-indigo-100 dark:bg-indigo-950/70 text-indigo-700 dark:text-indigo-300 text-[10px] font-black uppercase px-2 py-0.5 rounded-full border border-indigo-200 dark:border-indigo-800">EOR</span>
                    </h1>
                    <p class="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-0.5">Alertas & Operaciones en Tiempo Real</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2.5">
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800/80 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white hover:bg-slate-200/70 dark:hover:bg-slate-700/80 transition-all focus:outline-none border border-slate-200/60 dark:border-slate-700/60 active:scale-95 shadow-sm" title="Alternar Modo Oscuro">
                    <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>

                <div id="auth-container"></div>
            </div>
        </div>
        
        <div class="mt-4 flex bg-slate-200/60 dark:bg-slate-900/90 p-1 rounded-xl shadow-inner w-full sm:w-auto max-w-md mx-auto border border-slate-300/40 dark:border-slate-800/80">
            <button onclick="cambiarVista('pendientes')" id="btn-pendientes" class="flex-1 py-2 bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 font-extrabold text-xs rounded-lg shadow-sm transition-all duration-200 flex items-center justify-center gap-1.5">
                <span></span> Pendientes
            </button>
            <button onclick="cambiarVista('resueltos')" id="btn-resueltos" class="flex-1 py-2 text-slate-500 dark:text-slate-400 font-bold text-xs hover:text-slate-700 dark:hover:text-slate-200 transition-all duration-200 flex items-center justify-center gap-1.5">
                <span>✅</span> Resueltos
            </button>
        </div>
    </header>

    <!-- MAIN CONTAINER SIN SCROLLBAR VISIBLE -->
    <main id="feed-container" class="flex-1 overflow-y-auto custom-scrollbar p-5 pb-32 max-w-7xl mx-auto w-full">
        <div class="flex justify-center items-center h-40"><span class="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full"></span></div>
    </main>

    <!-- BOTÓN ACCIÓN FLOTANTE (FAB) -->
    <button onclick="abrirModalNueva()" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-tr from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white rounded-2xl shadow-lg shadow-indigo-600/30 flex justify-center items-center active:scale-90 transition-all duration-200 z-50 border border-indigo-400/30 group">
        <svg class="w-6 h-6 transform group-hover:rotate-90 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
    </button>

    <!-- MODAL REPORTAR NOVEDAD -->
    <div id="modal-nueva" class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-[100] hidden flex flex-col justify-end transition-opacity opacity-0 duration-200">
        <div class="bg-white dark:bg-slate-900 w-full md:w-[500px] md:mx-auto md:mb-6 rounded-t-3xl md:rounded-3xl shadow-2xl transform translate-y-full transition-transform duration-250 ease-out max-h-[90vh] flex flex-col border border-slate-200/80 dark:border-slate-800/80" id="modal-content">
            <div class="flex justify-between items-center p-5 border-b border-slate-100 dark:border-slate-800 shrink-0">
                <div class="flex items-center gap-2">
                    <span class="text-xl">📋</span>
                    <h2 class="text-lg font-black text-slate-900 dark:text-white">Reportar Novedad</h2>
                </div>
                <button onclick="cerrarModalNueva()" class="p-2 bg-slate-100 dark:bg-slate-800 text-slate-400 hover:text-slate-700 dark:hover:text-white rounded-xl transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            
            <form onsubmit="enviarNovedad(event)" class="p-5 flex-1 overflow-y-auto flex flex-col gap-4 custom-scrollbar">
                
                <div class="relative">
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Buscar Conductor</label>
                    <input type="text" id="input-nom" placeholder="Escriba nombre o tractor..." class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none uppercase shadow-sm transition-all" autocomplete="off" oninput="filtrarChoferes('nom')" onfocus="filtrarChoferes('nom')" required>
                    
                    <div id="dropdown-choferes" class="hidden absolute z-50 w-full mt-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-2xl max-h-60 overflow-y-auto custom-scrollbar"></div>
                </div>
                
                <input type="hidden" id="input-ute">
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Tractor</label>
                        <input type="text" id="input-tractor" placeholder="Dominio" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 uppercase outline-none focus:ring-2 focus:ring-indigo-500 transition-all" autocomplete="off" oninput="filtrarChoferes('tractor')" onfocus="filtrarChoferes('tractor')">
                        <div id="dropdown-tractores" class="hidden absolute z-50 w-full mt-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-2xl max-h-60 overflow-y-auto custom-scrollbar"></div>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Servicio</label>
                        <select id="input-srv" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 outline-none appearance-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                            <option value="LIVIANO">LIVIANO</option><option value="METANOL">METANOL</option><option value="YPF">YPF</option><option value="S/A">OTRO</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Clasificación</label>
                    <select id="input-tipo" onchange="adaptarFormulario(this.value)" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 outline-none appearance-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer" required>
                        <option value="" disabled selected>Seleccionar...</option>
                        <option value="EN_SERVICIO">🟢 En Servicio</option>
                        <option value="BAJA_DIAGRAMA">📅 Baja / Término de Diagrama</option>
                        <option value="CERTIFICACION_UNIDAD">🚚 Certificación de Unidad</option>
                        <option value="EXAMEN_CHOFER">🩺 Exámenes / Vencimientos</option>
                        <option value="REPARACION">🔧 Reparación Requerida</option>
                    </select>
                </div>

                <div id="div-fecha">
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Fecha Objetivo / Venc. <span class="text-slate-400 font-normal lowercase">(opcional)</span></label>
                    <input type="date" id="input-fecha" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Detalle / Notas</label>
                    <textarea id="input-detalle" rows="3" placeholder="Describa el requerimiento..." class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-sm font-medium text-slate-800 dark:text-slate-200 outline-none resize-none focus:ring-2 focus:ring-indigo-500 transition-all"></textarea>
                </div>

                <button type="submit" id="btn-submit" class="mt-2 w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-extrabold text-xs uppercase tracking-widest p-4 rounded-xl shadow-lg shadow-indigo-600/20 active:scale-[0.98] transition-all">
                    Publicar Novedad
                </button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // 👉 INICIALIZACIÓN MODO OSCURO
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('icon-moon').classList.add('hidden');
            document.getElementById('icon-sun').classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            document.getElementById('icon-moon').classList.toggle('hidden', isDark);
            document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
        }

        const API_URL = 'https://diagramasnode.onrender.com';
        const socket = io(API_URL);

        let RAM_Novedades = [];
        let RAM_Flota = [];
        let vistaActual = 'pendientes';

        // Bootstrapping
        fetch(`${API_URL}/api/datos`).then(res => res.json()).then(data => { if(data.success && data.diagramas) RAM_Flota = data.diagramas.diagramas; });
        fetch(`${API_URL}/api/novedades`).then(res => res.json()).then(data => { if(data.success) { RAM_Novedades = data.data; renderizar(); } });

        socket.on('datos_actualizados', (data) => { if(data && data.diagramas) RAM_Flota = data.diagramas.diagramas; });
        socket.on('novedades_actualizadas', (data) => { RAM_Novedades = data; renderizar(); });

        function cambiarVista(vista) {
            vistaActual = vista;
            const btnP = document.getElementById('btn-pendientes');
            const btnR = document.getElementById('btn-resueltos');
            
            if(vista === 'pendientes') {
                btnP.className = 'flex-1 py-2 bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 font-extrabold text-xs rounded-lg shadow-sm transition-all duration-200 flex items-center justify-center gap-1.5';
                btnR.className = 'flex-1 py-2 text-slate-500 dark:text-slate-400 font-bold text-xs hover:text-slate-700 dark:hover:text-slate-200 transition-all duration-200 flex items-center justify-center gap-1.5';
            } else {
                btnR.className = 'flex-1 py-2 bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 font-extrabold text-xs rounded-lg shadow-sm transition-all duration-200 flex items-center justify-center gap-1.5';
                btnP.className = 'flex-1 py-2 text-slate-500 dark:text-slate-400 font-bold text-xs hover:text-slate-700 dark:hover:text-slate-200 transition-all duration-200 flex items-center justify-center gap-1.5';
            }
            renderizar();
        }

        function esMenorA24Horas(isoStr) {
            if (!isoStr) return false;
            return (new Date() - new Date(isoStr)) < (24 * 60 * 60 * 1000);
        }

        // ==============================================================
        // 🔄 MOTOR DE RENDERS (KANBAN / CARRUSEL + AUTO-SCROLL RÁPIDO)
        // ==============================================================
        let autoScrollIntervals = [];

        function renderizar() {
            const container = document.getElementById('feed-container');
            
            autoScrollIntervals.forEach(clearInterval);
            autoScrollIntervals = [];

            const activas = RAM_Novedades.filter(n => !n.resuelto);
            const resueltasTodas = RAM_Novedades.filter(n => n.resuelto);

            if (vistaActual === 'resueltos') {
                if (resueltasTodas.length === 0) {
                    container.innerHTML = `<div class="col-span-full h-64 flex flex-col justify-center items-center text-slate-400 dark:text-slate-500 opacity-80"><svg class="w-14 h-14 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="font-extrabold tracking-widest uppercase text-xs">Sin historial de resueltos</span></div>`;
                    return;
                }

                const gridClass = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 items-start content-start w-full mb-8";
                let htmlResueltos = `<div class="${gridClass}">`;
                resueltasTodas.forEach(n => { htmlResueltos += generarHtmlCard(n); });
                htmlResueltos += `</div>`;
                
                container.innerHTML = htmlResueltos;
                return;
            }

            if (activas.length === 0) {
                container.innerHTML = `<div class="col-span-full h-64 flex flex-col justify-center items-center text-slate-400 dark:text-slate-500 opacity-80"><svg class="w-14 h-14 mb-3 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="font-extrabold tracking-widest uppercase text-xs text-slate-600 dark:text-slate-400">Bandeja Limpia ✨</span></div>`;
                return;
            }

            const categorias = {
                'EN_SERVICIO': { titulo: '🟢 En Servicio / Operativo', colorText: 'text-emerald-600 dark:text-emerald-400', badgeBg: 'bg-emerald-100 dark:bg-emerald-950/60 text-emerald-700 dark:text-emerald-300', items: [] },
                'BAJA_DIAGRAMA': { titulo: '📅 Baja / Término de Diagrama', colorText: 'text-amber-600 dark:text-amber-400', badgeBg: 'bg-amber-100 dark:bg-amber-950/60 text-amber-700 dark:text-amber-300', items: [] },
                'CERTIFICACION_UNIDAD': { titulo: '🚚 Certificaciones de Unidad', colorText: 'text-blue-600 dark:text-blue-400', badgeBg: 'bg-blue-100 dark:bg-blue-950/60 text-blue-700 dark:text-blue-300', items: [] },
                'EXAMEN_CHOFER': { titulo: '🩺 Exámenes / Vencimientos', colorText: 'text-rose-600 dark:text-rose-400', badgeBg: 'bg-rose-100 dark:bg-rose-950/60 text-rose-700 dark:text-rose-300', items: [] },
                'REPARACION': { titulo: '🔧 Reparaciones Requeridas', colorText: 'text-slate-700 dark:text-slate-300', badgeBg: 'bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300', items: [] }
            };

            activas.forEach(n => {
                if (categorias[n.tipo_novedad]) categorias[n.tipo_novedad].items.push(n);
                else categorias['REPARACION'].items.push(n);
            });

            let htmlFinal = '';
            let idsCarruseles = [];

            const carouselClass = "grid grid-flow-col auto-cols-[88%] sm:auto-cols-[55%] md:auto-cols-[42%] lg:auto-cols-[31%] gap-5 overflow-x-auto pb-4 pt-2 custom-scrollbar items-stretch w-full";

            Object.keys(categorias).forEach((key, index) => {
                const cat = categorias[key];
                if (cat.items.length > 0) {
                    let carouselId = `carrusel-cat-${index}`;
                    idsCarruseles.push(carouselId);

                    htmlFinal += `
                    <section class="w-full mb-8">
                        <div class="w-full mb-3 shrink-0 flex items-center justify-between border-b border-slate-200/80 dark:border-slate-800/80 pb-2">
                            <h2 class="text-xs font-black uppercase tracking-widest ${cat.colorText} flex items-center gap-2">
                                ${cat.titulo}
                            </h2>
                            <span class="${cat.badgeBg} px-2.5 py-0.5 rounded-full text-[10px] font-black">${cat.items.length}</span>
                        </div>
                        <div id="${carouselId}" class="${carouselClass}">`;
                    
                    cat.items.forEach(n => { htmlFinal += generarHtmlCard(n); });
                    
                    htmlFinal += `</div></section>`;
                }
            });

            container.innerHTML = htmlFinal;

            setTimeout(() => {
                idsCarruseles.forEach(id => inicializarAutoScroll(id));
            }, 80);
        }

        // ==============================================================
        // 🚄 MOTOR DE AUTO-SCROLL ÁGIL (REACTIVADO Y FLUIDO)
        // ==============================================================
        function inicializarAutoScroll(containerId) {
            const track = document.getElementById(containerId);
            if (!track) return;

            let isPaused = false;
            let scrollSpeed = 1.8;

            track.addEventListener('mouseenter', () => isPaused = true);
            track.addEventListener('mouseleave', () => isPaused = false);
            track.addEventListener('touchstart', () => isPaused = true, {passive: true});
            track.addEventListener('touchend', () => {
                setTimeout(() => isPaused = false, 1200);
            }, {passive: true});

            const interval = setInterval(() => {
                if (isPaused) return;

                if (track.scrollWidth > track.clientWidth) {
                    track.scrollLeft += scrollSpeed;

                    if (Math.ceil(track.scrollLeft + track.clientWidth) >= track.scrollWidth - 2) {
                        isPaused = true;
                        setTimeout(() => {
                            track.scrollTo({ left: 0, behavior: 'smooth' });
                            setTimeout(() => isPaused = false, 1000);
                        }, 1200);
                    }
                }
            }, 25);

            autoScrollIntervals.push(interval);
        }

        function formatearTimestamp(ts, id) {
            let d = ts ? new Date(ts) : null;
            if (!d || isNaN(d.getTime())) {
                if (id && !isNaN(Number(id)) && Number(id) > 1000000000000) {
                    d = new Date(Number(id));
                } else {
                    return '';
                }
            }
            const dia = d.getDate();
            const meses = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
            const mes = meses[d.getMonth()];
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return `${dia} ${mes} ${hh}:${mm}`;
        }

        // ==============================================================
        // 🎨 CONSTRUCCIÓN DE LA CARD DE NOVEDAD
        // ==============================================================
        function generarHtmlCard(n) {
            let cfg = { icon: '📌', bg: 'bg-indigo-50/70 dark:bg-indigo-950/40', text: 'text-indigo-900 dark:text-indigo-200', border: 'border-indigo-100 dark:border-indigo-900/40' };
            if (n.tipo_novedad === 'EN_SERVICIO') cfg = { icon: '🟢', bg: 'bg-emerald-50/70 dark:bg-emerald-950/40', text: 'text-emerald-900 dark:text-emerald-200', border: 'border-emerald-200/60 dark:border-emerald-900/40' };
            if (n.tipo_novedad === 'BAJA_DIAGRAMA') cfg = { icon: '📅', bg: 'bg-amber-50/70 dark:bg-amber-950/40', text: 'text-amber-900 dark:text-amber-200', border: 'border-amber-200/60 dark:border-amber-900/40' };
            if (n.tipo_novedad === 'CERTIFICACION_UNIDAD') cfg = { icon: '🚚', bg: 'bg-blue-50/70 dark:bg-blue-950/40', text: 'text-blue-900 dark:text-blue-200', border: 'border-blue-200/60 dark:border-blue-900/40' };
            if (n.tipo_novedad === 'EXAMEN_CHOFER') cfg = { icon: '🩺', bg: 'bg-rose-50/70 dark:bg-rose-950/40', text: 'text-rose-900 dark:text-rose-200', border: 'border-rose-200/60 dark:border-rose-900/40' };
            if (n.tipo_novedad === 'REPARACION') cfg = { icon: '🔧', bg: 'bg-slate-100/80 dark:bg-slate-800/60', text: 'text-slate-800 dark:text-slate-200', border: 'border-slate-200 dark:border-slate-700/60' };

            let cardClass = n.resuelto 
                ? "bg-emerald-50/40 dark:bg-emerald-950/20 border-emerald-200/80 dark:border-emerald-900/40 opacity-75 grayscale-[0.1]" 
                : "bg-white dark:bg-slate-900 border-slate-200/90 dark:border-slate-800 shadow-sm hover:shadow-md hover:border-slate-300 dark:hover:border-slate-700";

            let timeFormatted = formatearTimestamp(n.timestamp, n.id);

            return `
            <article id="card-${n.id}" class="snap-start rounded-2xl p-5 border relative overflow-hidden transition-all duration-300 w-full flex flex-col h-full ${cardClass}">
                <div class="flex justify-between items-start mb-3.5">
                    <div class="flex flex-col min-w-0 pr-3">
                        <h3 class="font-extrabold ${n.resuelto ? 'text-emerald-900 dark:text-emerald-400' : 'text-slate-900 dark:text-white'} text-base sm:text-lg leading-tight uppercase truncate w-full tracking-tight">${n.nom}</h3>
                        <div class="flex items-center gap-2 mt-1.5 flex-wrap">
                            <span class="bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-2.5 py-0.5 rounded-md text-[9px] font-black tracking-widest uppercase border border-slate-200 dark:border-slate-700">${n.srv}</span>
                            <span class="text-xs font-extrabold ${n.resuelto ? 'text-emerald-700 dark:text-emerald-500' : 'text-indigo-600 dark:text-indigo-400'} tracking-wide">${n.tractor}</span>
                        </div>
                    </div>
                    <button ${n.resuelto ? 'disabled' : `onclick="resolver(${n.id})"`} class="w-8 h-8 rounded-xl border shrink-0 transition-all duration-150 shadow-sm focus:outline-none flex items-center justify-center ${n.resuelto ? 'bg-emerald-500 border-emerald-500 text-white cursor-default' : 'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:bg-emerald-500 hover:border-emerald-500 hover:text-white text-slate-400 dark:text-slate-500 cursor-pointer active:scale-90'}" title="${n.resuelto ? 'Resuelto' : 'Marcar como resuelto'}">
                        <svg class="w-4 h-4 stroke-[3]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                    </button>
                </div>

                <div class="${cfg.bg} ${cfg.border} border rounded-xl p-3.5 mt-auto flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-center border-b border-black/5 dark:border-white/5 pb-2 mb-2 gap-2">
                            <span class="${cfg.text} text-[10px] font-black uppercase tracking-widest flex items-center gap-1.5 shrink-0">${cfg.icon} ${String(n.tipo_novedad).replace(/_/g, ' ')}</span>
                            ${n.fecha_objetivo ? `<span class="bg-white/90 dark:bg-slate-950/70 px-2 py-0.5 rounded-md text-[9px] font-black ${cfg.text} shadow-2xs whitespace-nowrap border border-black/5 dark:border-white/5">${n.fecha_objetivo.split('-').reverse().join('/')}</span>` : ''}
                        </div>
                        <p class="${cfg.text} text-xs font-semibold leading-relaxed whitespace-pre-wrap break-words mb-2">${n.detalle}</p>
                    </div>
                    <div class="flex justify-between items-center pt-1.5 border-t border-black/5 dark:border-white/5 mt-1 text-[9px] font-bold text-slate-400 dark:text-slate-500">
                        <span class="truncate pr-2 uppercase flex items-center gap-1" title="Creador">
                            👤 ${n.creador || n.usuario || 'Anónimo'}
                        </span>
                        ${timeFormatted ? `<span class="shrink-0 flex items-center gap-1 tracking-wider">
                            🕒 ${timeFormatted}
                        </span>` : ''}
                    </div>
                </div>
            </article>`;
        }

        // ==============================================================
        // ⚡ ACCIÓN DE RESOLVER CON SALIDA ULTRARRÁPIDA HACIA LOS BORDES (150ms)
        // ==============================================================
        function resolver(id) {
            if (vistaActual === 'resueltos') return;
            
            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.classList.add('fade-out');
                
                setTimeout(() => {
                    let idx = RAM_Novedades.findIndex(n => String(n.id) === String(id));
                    if (idx > -1) {
                        RAM_Novedades[idx].resuelto = true;
                        RAM_Novedades[idx].fecha_resolucion = new Date().toISOString();
                    }
                    renderizar();
                }, 150);
            } else {
                let idx = RAM_Novedades.findIndex(n => String(n.id) === String(id));
                if (idx > -1) {
                    RAM_Novedades[idx].resuelto = true;
                    RAM_Novedades[idx].fecha_resolucion = new Date().toISOString();
                }
                renderizar();
            }

            fetch(`${API_URL}/api/novedades/actualizar`, { 
                method: 'POST', 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ action: 'resolver', id_novedad: id }) 
            }).catch(e => console.error("Error al persistir resolución:", e));
        }

        // AUTOCOMPLETADO Y DESPLIEGUE COMPLETO SCROLLEABLE
        function filtrarChoferes(origen = 'nom') {
            const inputNom = document.getElementById('input-nom');
            const inputTractor = document.getElementById('input-tractor');
            const dropNom = document.getElementById('dropdown-choferes');
            const dropTractor = document.getElementById('dropdown-tractores');
            
            const isTractor = origen === 'tractor';
            const input = isTractor ? inputTractor : inputNom;
            const drop = isTractor ? dropTractor : dropNom;
            const otherDrop = isTractor ? dropNom : dropTractor;
            
            if (otherDrop) otherDrop.classList.add('hidden');
            if (!drop) return;

            const val = input.value.toLowerCase().trim();

            let filtrados = RAM_Flota;
            if (val.length > 0) {
                filtrados = RAM_Flota.filter(c => 
                    c.nom.toLowerCase().includes(val) || 
                    (c.tractor && c.tractor.toLowerCase().includes(val))
                );
            }

            if (filtrados.length === 0) {
                drop.classList.add('hidden');
                return;
            }

            let html = '';
            filtrados.forEach(c => {
                html += `
                <div onclick="seleccionarAutocompletado('${c.nom.replace(/'/g, "\\'")}', '${c.tractor || ''}', '${c.srv || 'S/A'}', '${c.n_ute || ''}')" class="p-3 border-b border-slate-100 dark:border-slate-800 hover:bg-indigo-50 dark:hover:bg-slate-800/80 cursor-pointer transition-colors flex justify-between items-center">
                    <div class="flex flex-col truncate pr-2">
                        <span class="font-extrabold text-xs text-slate-800 dark:text-slate-200 truncate">${c.nom}</span>
                        <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-0.5">UTE: ${c.n_ute || '-'}</span>
                    </div>
                    <div class="flex flex-col items-end shrink-0">
                        <span class="font-black text-indigo-600 dark:text-indigo-400 text-xs tracking-wide">${c.tractor || 'S/D'}</span>
                        <span class="text-[9px] font-black bg-slate-100 dark:bg-slate-950 text-slate-600 dark:text-slate-400 px-1.5 py-0.5 rounded mt-1 uppercase border border-slate-200 dark:border-slate-800">${c.srv || 'S/A'}</span>
                    </div>
                </div>`;
            });
            drop.innerHTML = html;
            drop.classList.remove('hidden');
        }

        function seleccionarAutocompletado(nom, tractor, srv, ute) {
            document.getElementById('input-nom').value = nom;
            document.getElementById('input-tractor').value = tractor;
            document.getElementById('input-ute').value = ute;
            let srvSelect = document.getElementById('input-srv');
            let opciones = Array.from(srvSelect.options).map(o => o.value);
            srvSelect.value = opciones.includes(srv) ? srv : 'S/A';
            const dropNom = document.getElementById('dropdown-choferes');
            const dropTractor = document.getElementById('dropdown-tractores');
            if (dropNom) dropNom.classList.add('hidden');
            if (dropTractor) dropTractor.classList.add('hidden');
        }

        document.addEventListener('click', (e) => {
            const dropNom = document.getElementById('dropdown-choferes');
            const dropTractor = document.getElementById('dropdown-tractores');
            const dropLogin = document.getElementById('dropdown-login');
            const authContainer = document.getElementById('auth-container');
            if (dropNom && !dropNom.contains(e.target) && e.target.id !== 'input-nom') dropNom.classList.add('hidden');
            if (dropTractor && !dropTractor.contains(e.target) && e.target.id !== 'input-tractor') dropTractor.classList.add('hidden');
            if (dropLogin && authContainer && !authContainer.contains(e.target)) dropLogin.classList.add('hidden');
        });

        // ==============================================================
        // 🔐 SISTEMA DE AUTENTICACIÓN Y SESIONES PERSISTENTES
        // ==============================================================
        let callbackPostLogin = null;

        function obtenerUsuarioSesion() {
            try {
                const data = localStorage.getItem('dash_user');
                return data ? JSON.parse(data) : null;
            } catch(e) { return null; }
        }

        function checkAuthUI() {
            const container = document.getElementById('auth-container');
            if (!container) return;
            
            const sesion = obtenerUsuarioSesion();
            if (sesion && sesion.usuario) {
                container.innerHTML = `
                    <div class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-xl border border-slate-200/80 dark:border-slate-700/80 shadow-sm">
                        <span class="text-xs font-black text-indigo-600 dark:text-indigo-400 uppercase flex items-center gap-1">
                            <span>👤</span> ${sesion.usuario}
                        </span>
                        <button onclick="cerrarSesion()" class="text-[10px] font-extrabold text-slate-400 hover:text-rose-500 transition-colors uppercase ml-1" title="Cerrar Sesión">Salir</button>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="relative">
                        <button onclick="toggleDropdownLogin()" class="px-3.5 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold text-xs transition-all shadow-sm active:scale-95 flex items-center gap-1.5 cursor-pointer">
                            🔑 <span>Entrar</span>
                        </button>

                        <div id="dropdown-login" class="hidden absolute right-0 mt-2 w-72 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl p-4 z-50">
                            <form onsubmit="ejecutarLogin(event)" class="flex flex-col gap-3">
                                <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 pb-2">
                                    <span class="text-xs font-black text-slate-800 dark:text-white uppercase tracking-wider flex items-center gap-1">🔑 Iniciar Sesión</span>
                                    <span class="text-[9px] font-bold text-slate-400 dark:text-slate-500">DB_Usuarios</span>
                                </div>
                                <div>
                                    <label class="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1 block">Usuario</label>
                                    <input type="text" id="login-user" placeholder="Escriba su usuario..." class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-2.5 text-xs font-bold text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none uppercase shadow-xs" required autocomplete="username">
                                </div>
                                <div>
                                    <label class="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1 block">Contraseña</label>
                                    <input type="password" id="login-pass" placeholder="••••••••" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-2.5 text-xs font-bold text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none shadow-xs" required autocomplete="current-password">
                                </div>

                                <p id="login-error" class="text-[10px] font-bold text-rose-500 hidden text-center mt-0.5"></p>

                                <button type="submit" id="btn-login-submit" class="mt-1 w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-extrabold text-xs uppercase tracking-widest p-2.5 rounded-xl shadow-md shadow-indigo-600/20 active:scale-[0.98] transition-all">
                                    Ingresar
                                </button>
                            </form>
                        </div>
                    </div>`;
            }
        }

        function toggleDropdownLogin(forceOpen = false) {
            const drop = document.getElementById('dropdown-login');
            if (!drop) return;
            if (forceOpen) {
                drop.classList.remove('hidden');
            } else {
                drop.classList.toggle('hidden');
            }
            if (!drop.classList.contains('hidden')) {
                const uIn = document.getElementById('login-user');
                if (uIn) setTimeout(() => uIn.focus(), 50);
            }
        }

        function ejecutarLogin(e) {
            e.preventDefault();
            const userIn = document.getElementById('login-user').value.trim();
            const passIn = document.getElementById('login-pass').value.trim();
            const btn = document.getElementById('btn-login-submit');
            const errP = document.getElementById('login-error');
            
            errP.classList.add('hidden');
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span>`;

            fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ usuario: userIn, password: passIn })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.usuario) {
                    localStorage.setItem('dash_user', JSON.stringify({ usuario: data.usuario, rol: data.rol || 'USER' }));
                    checkAuthUI();

                    if (callbackPostLogin === 'abrirModalNueva') {
                        abrirModalNueva();
                    }
                    callbackPostLogin = null;
                } else {
                    errP.innerText = data.error || 'Usuario o contraseña incorrectos';
                    errP.classList.remove('hidden');
                }
            })
            .catch(err => {
                errP.innerText = 'Error de conexión con el servidor';
                errP.classList.remove('hidden');
            })
            .finally(() => {
                if (btn) btn.innerHTML = 'INGRESAR';
            });
        }

        function cerrarSesion() {
            localStorage.removeItem('dash_user');
            checkAuthUI();
        }

        checkAuthUI();

        // MODAL Y LÓGICA DE ENVÍO
        function abrirModalNueva() {
            const sesion = obtenerUsuarioSesion();
            if (!sesion || !sesion.usuario) {
                toggleDropdownLogin(true);
                return;
            }

            const modal = document.getElementById('modal-nueva');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('modal-content').classList.remove('translate-y-full');
            }, 10);
        }

        function cerrarModalNueva() {
            const modal = document.getElementById('modal-nueva');
            modal.classList.add('opacity-0');
            document.getElementById('modal-content').classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 250);
        }

        function adaptarFormulario(tipo) {
            document.getElementById('input-fecha').required = false;
        }

        function enviarNovedad(e) {
            e.preventDefault();
            const sesion = obtenerUsuarioSesion();
            const creadorNom = sesion && sesion.usuario ? sesion.usuario : 'Anónimo';

            const btn = document.getElementById('btn-submit');
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span>`;
            
            const payload = {
                nom: document.getElementById('input-nom').value.toUpperCase(),
                tractor: document.getElementById('input-tractor').value.toUpperCase(),
                srv: document.getElementById('input-srv').value,
                n_ute: document.getElementById('input-ute').value || 'S/D',
                tipo_novedad: document.getElementById('input-tipo').value,
                fecha_objetivo: document.getElementById('input-fecha').value,
                detalle: document.getElementById('input-detalle').value,
                creador: creadorNom
            };

            fetch(`${API_URL}/api/novedades/actualizar`, {
                method: 'POST', headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: 'nueva', payload })
            }).then(() => {
                cerrarModalNueva(); e.target.reset();
            }).finally(() => { btn.innerHTML = "PUBLICAR NOVEDAD"; });
        }
    </script>
</body>
</html>
