<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novedades Live | EOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; } /* Clean look mobile */
        .fade-out { opacity: 0; transform: translateX(20px) scale(0.95); transition: all 0.3s ease; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-slate-800">

    <!-- HEADER FLOTANTE -->
    <header class="bg-white px-5 pt-8 pb-4 shadow-sm z-50 shrink-0 border-b border-slate-200">
        <h1 class="text-2xl font-black tracking-tight text-slate-900">Live Feed</h1>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Alertas & Operaciones</p>
        
        <!-- Toggle Trello -->
        <div class="mt-4 flex bg-slate-100 p-1 rounded-xl shadow-inner w-full sm:w-auto mx-auto">
            <button onclick="cambiarVista('pendientes')" id="btn-pendientes" class="flex-1 py-2 bg-white text-indigo-700 font-bold text-xs rounded-lg shadow transition-all">Pendientes</button>
            <button onclick="cambiarVista('resueltos')" id="btn-resueltos" class="flex-1 py-2 text-slate-500 font-bold text-xs hover:text-slate-700 transition-all">Resueltos</button>
        </div>
    </header>

    <!-- FEED (SNAP CAROUSEL) -->
    <main id="feed-container" class="flex-1 overflow-y-auto custom-scrollbar snap-y snap-mandatory p-5 pb-32">
        <div class="flex justify-center items-center h-full"><span class="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full"></span></div>
    </main>

    <!-- FAB (Floating Action Button) PARA NUEVA NOVEDAD -->
    <button onclick="abrirModalNueva()" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg hover:bg-indigo-700 flex justify-center items-center active:scale-90 transition-all z-50">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
    </button>

    <!-- MODAL NUEVA NOVEDAD (BOTTOM SHEET) -->
    <div id="modal-nueva" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] hidden flex flex-col justify-end transition-opacity opacity-0">
        <div class="bg-white w-full rounded-t-3xl shadow-2xl transform translate-y-full transition-transform duration-300 h-[85vh] flex flex-col" id="modal-content">
            <div class="flex justify-between items-center p-5 border-b border-slate-100 shrink-0">
                <h2 class="text-xl font-black text-slate-800">Reportar Novedad</h2>
                <button onclick="cerrarModalNueva()" class="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-slate-200"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            
            <form onsubmit="enviarNovedad(event)" class="p-5 flex-1 overflow-y-auto flex flex-col gap-5">
                <div class="relative">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block">Buscar Conductor</label>
                    <input type="text" id="input-nom" placeholder="Escriba nombre o tractor..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-bold text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none uppercase shadow-sm transition-all" autocomplete="off" oninput="filtrarChoferes()" onfocus="filtrarChoferes()" required>
                    
                    <div id="dropdown-choferes" class="hidden absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-2xl max-h-56 overflow-y-auto custom-scrollbar">
                    </div>
                </div>
                
                <input type="hidden" id="input-ute">
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block">Tractor</label>
                        <input type="text" id="input-tractor" placeholder="Dominio" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-bold text-slate-800 uppercase outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block">Servicio</label>
                        <select id="input-srv" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-bold text-slate-800 outline-none appearance-none">
                            <option value="LIVIANO">LIVIANO</option><option value="METANOL">METANOL</option><option value="YPF">YPF</option><option value="S/A">OTRO</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block">Clasificación</label>
                    <select id="input-tipo" onchange="adaptarFormulario(this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-bold text-slate-800 outline-none appearance-none" required>
                        <option value="" disabled selected>Seleccionar...</option>
                        <option value="BAJA_DIAGRAMA">📅 Baja / Término de Diagrama</option>
                        <option value="CERTIFICACION_UNIDAD">🚚 Certificación de Unidad</option>
                        <option value="EXAMEN_CHOFER">🩺 Exámenes / Vencimientos</option>
                        <option value="REPARACION">🔧 Reparación Requerida</option>
                    </select>
                </div>

                <div id="div-fecha" class="hidden">
                    <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-1.5 block">Fecha Objetivo / Vencimiento</label>
                    <input type="date" id="input-fecha" class="w-full bg-indigo-50 border border-indigo-200 rounded-xl p-3 text-sm font-bold text-indigo-900 outline-none">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block">Detalle / Notas</label>
                    <textarea id="input-detalle" rows="3" placeholder="Describa el requerimiento..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-medium text-slate-800 outline-none resize-none"></textarea>
                </div>

                <button type="submit" id="btn-submit" class="mt-auto w-full bg-indigo-600 text-white font-black text-sm uppercase tracking-widest p-4 rounded-xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
                    Publicar Novedad
                </button>
            </form>
        </div>
    </div>

    <!-- SOCKET.IO & LÓGICA -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // 👉 IMPORTANTE: Reemplaza esta URL con el dominio real de tu API en Render
        const API_URL = 'https://diagramasnode.onrender.com';
        const socket = io(API_URL);

        let RAM_Novedades = [];
        let vistaActual = 'pendientes';

        // 1. Obtener primera carga vía API Rest
        fetch(`${API_URL}/api/novedades`)
            .then(res => res.json())
            .then(data => { if(data.success) { RAM_Novedades = data.data; renderizar(); } });

        // 2. Escuchar Sockets en tiempo real
        socket.on('novedades_actualizadas', (data) => {
            RAM_Novedades = data;
            renderizar();
        });

        function cambiarVista(vista) {
            vistaActual = vista;
            document.getElementById('btn-pendientes').className = vista === 'pendientes' ? 'flex-1 py-2 bg-white text-indigo-700 font-bold text-xs rounded-lg shadow transition-all' : 'flex-1 py-2 text-slate-500 font-bold text-xs hover:text-slate-700 transition-all';
            document.getElementById('btn-resueltos').className = vista === 'resueltos' ? 'flex-1 py-2 bg-white text-indigo-700 font-bold text-xs rounded-lg shadow transition-all' : 'flex-1 py-2 text-slate-500 font-bold text-xs hover:text-slate-700 transition-all';
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById('feed-container');
            const data = RAM_Novedades.filter(n => vistaActual === 'pendientes' ? !n.resuelto : n.resuelto);

            if(data.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col justify-center items-center text-slate-300 opacity-60"><svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="font-black tracking-widest uppercase text-xs">Todo al día</span></div>`;
                return;
            }

            let html = '';
            data.forEach(n => {
                let cfg = { icon: '📌', bg: 'bg-indigo-50', text: 'text-indigo-900', border: 'border-indigo-100' };
                if (n.tipo_novedad === 'BAJA_DIAGRAMA') cfg = { icon: '📅', bg: 'bg-orange-50', text: 'text-orange-900', border: 'border-orange-200' };
                if (n.tipo_novedad === 'CERTIFICACION_UNIDAD') cfg = { icon: '🚚', bg: 'bg-blue-50', text: 'text-blue-900', border: 'border-blue-200' };
                if (n.tipo_novedad === 'EXAMEN_CHOFER') cfg = { icon: '🩺', bg: 'bg-rose-50', text: 'text-rose-900', border: 'border-rose-200' };
                if (n.tipo_novedad === 'REPARACION') cfg = { icon: '🔧', bg: 'bg-slate-100', text: 'text-slate-800', border: 'border-slate-200' };

                html += `
                <article id="card-${n.id}" class="snap-start bg-white rounded-2xl p-5 mb-4 shadow-sm border border-slate-200 relative overflow-hidden transition-all duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex flex-col">
                            <h3 class="font-black text-slate-900 text-lg leading-tight uppercase">${n.nom}</h3>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="bg-slate-100 text-slate-500 px-2 py-0.5 rounded text-[9px] font-black tracking-widest uppercase border border-slate-200">${n.srv}</span>
                                <span class="text-xs font-bold text-indigo-600 tracking-wide">${n.tractor}</span>
                            </div>
                        </div>
                        <button onclick="resolver(${n.id})" class="w-8 h-8 rounded-lg border-2 ${n.resuelto ? 'bg-emerald-500 border-emerald-500' : 'bg-slate-50 border-slate-300 hover:border-emerald-400'} flex items-center justify-center shrink-0 transition-colors shadow-sm focus:outline-none">
                            ${n.resuelto ? `<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>` : ''}
                        </button>
                    </div>

                    <div class="${cfg.bg} ${cfg.border} border rounded-xl p-3.5">
                        <div class="flex justify-between items-center border-b border-black/5 pb-2 mb-2">
                            <span class="${cfg.text} text-[10px] font-black uppercase tracking-widest flex items-center gap-1.5">${cfg.icon} ${String(n.tipo_novedad).replace('_', ' ')}</span>
                            ${n.fecha_objetivo ? `<span class="bg-white/80 px-2 py-0.5 rounded text-[9px] font-black text-slate-700 shadow-sm">${n.fecha_objetivo.split('-').reverse().join('/')}</span>` : ''}
                        </div>
                        <p class="${cfg.text} text-xs font-medium leading-relaxed">${n.detalle}</p>
                    </div>
                </article>`;
            });
            container.innerHTML = html;
        }

        // 3. Optimistic UI Resolver
        function resolver(id) {
            if (vistaActual === 'resueltos') return;
            const card = document.getElementById(`card-${id}`);
            if(card) card.classList.add('fade-out');

            setTimeout(() => {
                let idx = RAM_Novedades.findIndex(n => String(n.id) === String(id));
                if(idx > -1) RAM_Novedades[idx].resuelto = true;
                renderizar();

                fetch(`${API_URL}/api/novedades/actualizar`, {
                    method: 'POST', headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: 'resolver', id_novedad: id })
                });
            }, 300);
        }

        // 4. Formulario Nueva Novedad
        function abrirModalNueva() {
            document.getElementById('modal-nueva').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-nueva').classList.remove('opacity-0');
                document.getElementById('modal-content').classList.remove('translate-y-full');
            }, 10);
        }

        function cerrarModalNueva() {
            document.getElementById('modal-nueva').classList.add('opacity-0');
            document.getElementById('modal-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('modal-nueva').classList.add('hidden'), 300);
        }

        function adaptarFormulario(tipo) {
            const div = document.getElementById('div-fecha');
            if (['BAJA_DIAGRAMA', 'CERTIFICACION_UNIDAD', 'EXAMEN_CHOFER'].includes(tipo)) {
                div.classList.remove('hidden');
                document.getElementById('input-fecha').required = true;
            } else {
                div.classList.add('hidden');
                document.getElementById('input-fecha').required = false;
            }
        }

        function enviarNovedad(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span>`;
            
            const payload = {
                nom: document.getElementById('input-nom').value.toUpperCase(),
                tractor: document.getElementById('input-tractor').value.toUpperCase(),
                srv: document.getElementById('input-srv').value,
                n_ute: document.getElementById('input-ute').value || 'S/D', // 👉 Se envía la UTE automáticamente
                tipo_novedad: document.getElementById('input-tipo').value,
                fecha_objetivo: document.getElementById('input-fecha').value,
                detalle: document.getElementById('input-detalle').value
            };

            fetch(`${API_URL}/api/novedades/actualizar`, {
                method: 'POST', headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: 'nueva', payload })
            })
            .then(() => {
                cerrarModalNueva();
                e.target.reset();
                document.getElementById('div-fecha').classList.add('hidden');
            })
            .finally(() => { btn.innerHTML = "Publicar Novedad"; });
        }

        // ==============================================================
        // 🧠 MOTOR DE AUTOCOMPLETADO EN RAM
        // ==============================================================
        let RAM_Flota = [];

        // 1. Descargamos el padrón maestro al iniciar
        fetch(`${API_URL}/api/datos`)
            .then(res => res.json())
            .then(data => {
                if (data.success && data.diagramas && data.diagramas.diagramas) {
                    RAM_Flota = data.diagramas.diagramas;
                }
            });

        // 2. Mantenemos la lista actualizada si hay cambios en vivo
        socket.on('datos_actualizados', (data) => {
             if (data && data.diagramas && data.diagramas.diagramas) {
                 RAM_Flota = data.diagramas.diagramas;
             }
        });

        // 3. Filtrar mientras el usuario escribe
        function filtrarChoferes() {
            const input = document.getElementById('input-nom');
            const drop = document.getElementById('dropdown-choferes');
            const val = input.value.toLowerCase().trim();
            
            if (val.length < 2) {
                drop.classList.add('hidden');
                return;
            }

            // Busca por nombre o por patente
            const filtrados = RAM_Flota.filter(c => 
                c.nom.toLowerCase().includes(val) || 
                (c.tractor && c.tractor.toLowerCase().includes(val))
            ).slice(0, 8); // Mostramos máximo 8 para no saturar la pantalla móvil

            if (filtrados.length === 0) {
                drop.classList.add('hidden');
                return;
            }

            let html = '';
            filtrados.forEach(c => {
                html += `
                <div onclick="seleccionarAutocompletado('${c.nom.replace(/'/g, "\\'")}', '${c.tractor || ''}', '${c.srv || 'S/A'}', '${c.n_ute || ''}')" class="p-3 border-b border-slate-100 hover:bg-indigo-50 cursor-pointer transition-colors flex justify-between items-center active:bg-indigo-100">
                    <div class="flex flex-col truncate pr-2">
                        <span class="font-black text-sm text-slate-800 truncate">${c.nom}</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">UTE: ${c.n_ute || '-'}</span>
                    </div>
                    <div class="flex flex-col items-end shrink-0">
                        <span class="font-black text-indigo-600 text-xs tracking-wide">${c.tractor || 'S/D'}</span>
                        <span class="text-[9px] font-black bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded mt-1 uppercase border border-slate-200">${c.srv || 'S/A'}</span>
                    </div>
                </div>`;
            });

            drop.innerHTML = html;
            drop.classList.remove('hidden');
        }

        // 4. Inyectar datos al formulario al seleccionar
        function seleccionarAutocompletado(nom, tractor, srv, ute) {
            document.getElementById('input-nom').value = nom;
            document.getElementById('input-tractor').value = tractor;
            document.getElementById('input-ute').value = ute;
            
            let srvSelect = document.getElementById('input-srv');
            let opciones = Array.from(srvSelect.options).map(o => o.value);
            srvSelect.value = opciones.includes(srv) ? srv : 'S/A';

            document.getElementById('dropdown-choferes').classList.add('hidden');
        }

        // 5. UX: Cerrar dropdown si se toca fuera
        document.addEventListener('click', (e) => {
            const drop = document.getElementById('dropdown-choferes');
            const input = document.getElementById('input-nom');
            if (drop && !drop.contains(e.target) && e.target !== input) {
                drop.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
