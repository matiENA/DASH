<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novedades Live | EOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Habilitamos el modo oscuro por clases
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; } 
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        .fade-out { opacity: 0; transform: scale(0.90); transition: all 0.3s ease; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <header class="bg-white dark:bg-slate-800 px-5 pt-8 pb-4 shadow-sm z-50 shrink-0 border-b border-slate-200 dark:border-slate-700 transition-colors duration-300">
        <div class="flex justify-between items-start max-w-7xl mx-auto">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-slate-900 dark:text-white">Live Feed</h1>
                <p class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-1">Alertas & Operaciones</p>
            </div>
            
            <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors focus:outline-none">
                <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>
        
        <div class="mt-4 flex bg-slate-100 dark:bg-slate-900/50 p-1 rounded-xl shadow-inner w-full sm:w-auto max-w-md mx-auto">
            <button onclick="cambiarVista('pendientes')" id="btn-pendientes" class="flex-1 py-2 bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-300 font-bold text-xs rounded-lg shadow transition-all">Pendientes</button>
            <button onclick="cambiarVista('resueltos')" id="btn-resueltos" class="flex-1 py-2 text-slate-500 dark:text-slate-400 font-bold text-xs hover:text-slate-700 dark:hover:text-slate-200 transition-all">Resueltos</button>
        </div>
    </header>

<main id="feed-container" class="flex-1 overflow-y-auto custom-scrollbar p-5 pb-32 max-w-7xl mx-auto w-full">
        <div class="flex justify-center items-center h-40"><span class="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full"></span></div>
    </main>

    <button onclick="abrirModalNueva()" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg hover:bg-indigo-700 flex justify-center items-center active:scale-90 transition-all z-50 border border-indigo-500">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
    </button>

    <div id="modal-nueva" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex flex-col justify-end transition-opacity opacity-0">
        <div class="bg-white dark:bg-slate-800 w-full md:w-[500px] md:mx-auto md:mb-6 rounded-t-3xl md:rounded-3xl shadow-2xl transform translate-y-full transition-transform duration-300 max-h-[90vh] flex flex-col border border-slate-200 dark:border-slate-700" id="modal-content">
            <div class="flex justify-between items-center p-5 border-b border-slate-100 dark:border-slate-700 shrink-0">
                <h2 class="text-xl font-black text-slate-800 dark:text-white">Reportar Novedad</h2>
                <button onclick="cerrarModalNueva()" class="p-2 bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 rounded-full hover:bg-slate-200 dark:hover:bg-slate-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            
            <form onsubmit="enviarNovedad(event)" class="p-5 flex-1 overflow-y-auto flex flex-col gap-4 custom-scrollbar">
                
                <div class="relative">
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Buscar Conductor</label>
                    <input type="text" id="input-nom" placeholder="Escriba nombre o tractor..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none uppercase shadow-sm transition-all" autocomplete="off" oninput="filtrarChoferes()" onfocus="filtrarChoferes()" required>
                    
                    <div id="dropdown-choferes" class="hidden absolute z-50 w-full mt-1 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-xl shadow-2xl max-h-56 overflow-y-auto custom-scrollbar"></div>
                </div>
                
                <input type="hidden" id="input-ute">
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Tractor</label>
                        <input type="text" id="input-tractor" placeholder="Dominio" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 uppercase outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Servicio</label>
                        <select id="input-srv" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 outline-none appearance-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            <option value="LIVIANO">LIVIANO</option><option value="METANOL">METANOL</option><option value="YPF">YPF</option><option value="S/A">OTRO</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Clasificación</label>
                    <select id="input-tipo" onchange="adaptarFormulario(this.value)" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-sm font-bold text-slate-800 dark:text-slate-200 outline-none appearance-none focus:ring-2 focus:ring-indigo-500 transition-all" required>
                        <option value="" disabled selected>Seleccionar...</option>
                        <option value="BAJA_DIAGRAMA">📅 Baja / Término de Diagrama</option>
                        <option value="CERTIFICACION_UNIDAD">🚚 Certificación de Unidad</option>
                        <option value="EXAMEN_CHOFER">🩺 Exámenes / Vencimientos</option>
                        <option value="REPARACION">🔧 Reparación Requerida</option>
                    </select>
                </div>

                <div id="div-fecha" class="hidden">
                    <label class="text-[10px] font-black text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1.5 block">Fecha Objetivo / Venc.</label>
                    <input type="date" id="input-fecha" class="w-full bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-200 dark:border-indigo-800/50 rounded-xl p-3 text-sm font-bold text-indigo-900 dark:text-indigo-200 outline-none color-scheme-dark">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Detalle / Notas</label>
                    <textarea id="input-detalle" rows="3" placeholder="Describa el requerimiento..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-sm font-medium text-slate-800 dark:text-slate-200 outline-none resize-none focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>

                <button type="submit" id="btn-submit" class="mt-2 w-full bg-indigo-600 text-white font-black text-sm uppercase tracking-widest p-4 rounded-xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
                    Publicar Novedad
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // 👉 INICIALIZACIÓN MODO OSCURO
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMatchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('icon-moon').classList.add('hidden');
            document.getElementById('icon-sun').classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            document.getElementById('icon-moon').classList.toggle('hidden', isDark);
            document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
        }

        const API_URL = 'https://diagramasnode.onrender.com';
        const socket = io(API_URL);

        let RAM_Novedades = [];
        let RAM_Flota = [];
        let vistaActual = 'pendientes';

        // Bootstrapping
        fetch(`${API_URL}/api/datos`).then(res => res.json()).then(data => { if(data.success && data.diagramas) RAM_Flota = data.diagramas.diagramas; });
        fetch(`${API_URL}/api/novedades`).then(res => res.json()).then(data => { if(data.success) { RAM_Novedades = data.data; renderizar(); } });

        socket.on('datos_actualizados', (data) => { if(data && data.diagramas) RAM_Flota = data.diagramas.diagramas; });
        socket.on('novedades_actualizadas', (data) => { RAM_Novedades = data; renderizar(); });

        function cambiarVista(vista) {
            vistaActual = vista;
            const btnP = document.getElementById('btn-pendientes');
            const btnR = document.getElementById('btn-resueltos');
            
            if(vista === 'pendientes') {
                btnP.className = 'flex-1 py-2 bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-300 font-bold text-xs rounded-lg shadow transition-all';
                btnR.className = 'flex-1 py-2 text-slate-500 dark:text-slate-400 font-bold text-xs hover:text-slate-700 dark:hover:text-slate-200 transition-all';
            } else {
                btnR.className = 'flex-1 py-2 bg-white dark:bg-slate-700 text-indigo-700 dark:text-indigo-300 font-bold text-xs rounded-lg shadow transition-all';
                btnP.className = 'flex-1 py-2 text-slate-500 dark:text-slate-400 font-bold text-xs hover:text-slate-700 dark:hover:text-slate-200 transition-all';
            }
            renderizar();
        }

        function esMenorA24Horas(isoStr) {
            if (!isoStr) return false;
            return (new Date() - new Date(isoStr)) < (24 * 60 * 60 * 1000);
        }

// ==============================================================
        // 🔄 MOTOR DE RENDERS Y CONTROL BINARIO (Trello-Style)
        // ==============================================================

        function renderizar() {
            const container = document.getElementById('feed-container');
            const gridClass = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 items-start content-start w-full mb-8";

            // Separamos estrictamente por el estado booleano "resuelto"
            const activas = RAM_Novedades.filter(n => !n.resuelto);
            const resueltasTodas = RAM_Novedades.filter(n => n.resuelto);

            // ==============================================================
            // 🏢 FILTRO 1: PESTAÑA RESUELTOS (HISTORIAL COMPLETO)
            // ==============================================================
            if (vistaActual === 'resueltos') {
                if (resueltasTodas.length === 0) {
                    container.innerHTML = `<div class="h-64 flex flex-col justify-center items-center text-slate-400 dark:text-slate-500 opacity-80"><svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="font-black tracking-widest uppercase text-xs">Sin historial de resueltos</span></div>`;
                    return;
                }

                let htmlResueltos = `<div class="${gridClass}">`;
                resueltasTodas.forEach(n => { htmlResueltos += generarHtmlCard(n); });
                htmlResueltos += `</div>`;
                
                container.innerHTML = htmlResueltos;
                return;
            }

            // ==============================================================
            // 📅 FILTRO 2: PESTAÑA PENDIENTES (SÓLO ACTIVAS)
            // ==============================================================
            if (activas.length === 0) {
                container.innerHTML = `<div class="h-64 flex flex-col justify-center items-center text-slate-400 dark:text-slate-500 opacity-80"><svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="font-black tracking-widest uppercase text-xs">Bandeja Limpia ✨</span></div>`;
                return;
            }

            let htmlFinal = `
            <div class="w-full mb-4 shrink-0">
                <h2 class="text-xs font-black uppercase tracking-widest text-indigo-600 dark:text-indigo-400 flex items-center gap-2 mb-3">
                    <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span> Novedades Activas (${activas.length})
                </h2>
            </div>
            <div class="${gridClass}">`;
            
            activas.forEach(n => { htmlFinal += generarHtmlCard(n); });
            htmlFinal += `</div>`;

            container.innerHTML = htmlFinal;
        }

        // ==============================================================
        // ⚡ ACCIÓN DE RESOLVER CON DESVANECIMIENTO INMEDIATO
        // ==============================================================
        function resolver(id) {
            if (vistaActual === 'resueltos') return;
            
            const card = document.getElementById(`card-${id}`);
            if (card) {
                // Inyectamos la animación de salida hacia la derecha
                card.classList.add('fade-out');
                
                // Esperamos los 300ms de la transición CSS para modificar los datos y limpiar el DOM
                setTimeout(() => {
                    let idx = RAM_Novedades.findIndex(n => String(n.id) === String(id));
                    if (idx > -1) {
                        RAM_Novedades[idx].resuelto = true;
                        RAM_Novedades[idx].fecha_resolucion = new Date().toISOString();
                    }
                    renderizar();
                }, 300);
            } else {
                let idx = RAM_Novedades.findIndex(n => String(n.id) === String(id));
                if (idx > -1) {
                    RAM_Novedades[idx].resuelto = true;
                    RAM_Novedades[idx].fecha_resolucion = new Date().toISOString();
                }
                renderizar();
            }

            // Despachamos la actualización persistente al servidor en segundo plano
            fetch(`${API_URL}/api/novedades/actualizar`, { 
                method: 'POST', 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ action: 'resolver', id_novedad: id }) 
            }).catch(e => console.error("Error al persistir resolución:", e));
        }        // 👉 FUNCIÓN AUXILIAR AISLADA PARA CONSTRUIRE EL HTML DE LA CARD
        function generarHtmlCard(n) {
            let cfg = { icon: '📌', bg: 'bg-indigo-50 dark:bg-indigo-900/30', text: 'text-indigo-900 dark:text-indigo-200', border: 'border-indigo-100 dark:border-indigo-800/50' };
            if (n.tipo_novedad === 'BAJA_DIAGRAMA') cfg = { icon: '📅', bg: 'bg-orange-50 dark:bg-orange-900/30', text: 'text-orange-900 dark:text-orange-200', border: 'border-orange-200 dark:border-orange-800/50' };
            if (n.tipo_novedad === 'CERTIFICACION_UNIDAD') cfg = { icon: '🚚', bg: 'bg-blue-50 dark:bg-blue-900/30', text: 'text-blue-900 dark:text-blue-200', border: 'border-blue-200 dark:border-blue-800/50' };
            if (n.tipo_novedad === 'EXAMEN_CHOFER') cfg = { icon: '🩺', bg: 'bg-rose-50 dark:bg-rose-900/30', text: 'text-rose-900 dark:text-rose-200', border: 'border-rose-200 dark:border-rose-800/50' };
            if (n.tipo_novedad === 'REPARACION') cfg = { icon: '🔧', bg: 'bg-slate-100 dark:bg-slate-800/50', text: 'text-slate-800 dark:text-slate-300', border: 'border-slate-200 dark:border-slate-700' };

            let cardClass = n.resuelto 
                ? "bg-emerald-50/40 dark:bg-emerald-900/10 border-emerald-200 dark:border-emerald-900/40 opacity-70 grayscale-[0.2] scale-[0.99]" 
                : "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 shadow-sm";

            return `
            <article id="card-${n.id}" class="rounded-2xl p-5 border relative overflow-hidden transition-all duration-500 w-full flex flex-col ${cardClass}">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex flex-col min-w-0 pr-3">
                        <h3 class="font-black ${n.resuelto ? 'text-emerald-900 dark:text-emerald-400' : 'text-slate-900 dark:text-white'} text-lg leading-tight uppercase truncate w-full">${n.nom}</h3>
                        <div class="flex items-center gap-2 mt-1.5 flex-wrap">
                            <span class="bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 px-2 py-0.5 rounded text-[9px] font-black tracking-widest uppercase border border-slate-200 dark:border-slate-600">${n.srv}</span>
                            <span class="text-xs font-bold ${n.resuelto ? 'text-emerald-700 dark:text-emerald-500' : 'text-indigo-600 dark:text-indigo-400'} tracking-wide">${n.tractor}</span>
                        </div>
                    </div>
                    <button ${n.resuelto ? 'disabled' : `onclick="resolver(${n.id})"`} class="w-8 h-8 rounded-lg border-2 shrink-0 transition-colors shadow-sm focus:outline-none flex items-center justify-center ${n.resuelto ? 'bg-emerald-500 border-emerald-500 dark:bg-emerald-600 dark:border-emerald-600 cursor-default' : 'bg-slate-50 dark:bg-slate-900 border-slate-300 dark:border-slate-600 hover:border-emerald-400 dark:hover:border-emerald-500 cursor-pointer'}">
                        ${n.resuelto ? `<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>` : ''}
                    </button>
                </div>

                <div class="${cfg.bg} ${cfg.border} border rounded-xl p-3.5 mt-auto">
                    <div class="flex justify-between items-center border-b border-black/5 dark:border-white/5 pb-2 mb-2 gap-2">
                        <span class="${cfg.text} text-[10px] font-black uppercase tracking-widest flex items-center gap-1.5 shrink-0">${cfg.icon} ${String(n.tipo_novedad).replace('_', ' ')}</span>
                        ${n.fecha_objetivo ? `<span class="bg-white/80 dark:bg-slate-950/50 px-2 py-0.5 rounded text-[9px] font-black ${cfg.text} shadow-sm whitespace-nowrap">${n.fecha_objetivo.split('-').reverse().join('/')}</span>` : ''}
                    </div>
                    <p class="${cfg.text} text-xs font-medium leading-relaxed whitespace-pre-wrap break-words">${n.detalle}</p>
                </div>
            </article>`;
        }
                // AUTOCOMPLETADO
        function filtrarChoferes() {
            const input = document.getElementById('input-nom');
            const drop = document.getElementById('dropdown-choferes');
            const val = input.value.toLowerCase().trim();
            if (val.length < 2) { drop.classList.add('hidden'); return; }

            const filtrados = RAM_Flota.filter(c => c.nom.toLowerCase().includes(val) || (c.tractor && c.tractor.toLowerCase().includes(val))).slice(0, 8);
            if (filtrados.length === 0) { drop.classList.add('hidden'); return; }

            let html = '';
            filtrados.forEach(c => {
                html += `
                <div onclick="seleccionarAutocompletado('${c.nom.replace(/'/g, "\\'")}', '${c.tractor || ''}', '${c.srv || 'S/A'}', '${c.n_ute || ''}')" class="p-3 border-b border-slate-100 dark:border-slate-700 hover:bg-indigo-50 dark:hover:bg-slate-700 cursor-pointer transition-colors flex justify-between items-center">
                    <div class="flex flex-col truncate pr-2">
                        <span class="font-black text-sm text-slate-800 dark:text-slate-200 truncate">${c.nom}</span>
                        <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-0.5">UTE: ${c.n_ute || '-'}</span>
                    </div>
                    <div class="flex flex-col items-end shrink-0">
                        <span class="font-black text-indigo-600 dark:text-indigo-400 text-xs tracking-wide">${c.tractor || 'S/D'}</span>
                        <span class="text-[9px] font-black bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-400 px-1.5 py-0.5 rounded mt-1 uppercase border border-slate-200 dark:border-slate-700">${c.srv || 'S/A'}</span>
                    </div>
                </div>`;
            });
            drop.innerHTML = html; drop.classList.remove('hidden');
        }

        function seleccionarAutocompletado(nom, tractor, srv, ute) {
            document.getElementById('input-nom').value = nom;
            document.getElementById('input-tractor').value = tractor;
            document.getElementById('input-ute').value = ute;
            let srvSelect = document.getElementById('input-srv');
            let opciones = Array.from(srvSelect.options).map(o => o.value);
            srvSelect.value = opciones.includes(srv) ? srv : 'S/A';
            document.getElementById('dropdown-choferes').classList.add('hidden');
        }

        document.addEventListener('click', (e) => {
            const drop = document.getElementById('dropdown-choferes');
            if (drop && !drop.contains(e.target) && e.target.id !== 'input-nom') drop.classList.add('hidden');
        });

        // MODAL Y LÓGICA
        function resolver(id) {
            if (vistaActual === 'resueltos') return;
            let idx = RAM_Novedades.findIndex(n => String(n.id) === String(id));
            if(idx > -1) { RAM_Novedades[idx].resuelto = true; RAM_Novedades[idx].fecha_resolucion = new Date().toISOString(); }
            
            const card = document.getElementById(`card-${id}`);
            if(card) {
                // Animación de salida antes de renderizar
                card.classList.add('fade-out');
                setTimeout(() => renderizar(), 300);
            } else { renderizar(); }

            fetch(`${API_URL}/api/novedades/actualizar`, { method: 'POST', headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: 'resolver', id_novedad: id }) }).catch(e => console.error(e));
        }

        function abrirModalNueva() {
            document.getElementById('modal-nueva').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-nueva').classList.remove('opacity-0');
                document.getElementById('modal-content').classList.remove('translate-y-full');
            }, 10);
        }

        function cerrarModalNueva() {
            document.getElementById('modal-nueva').classList.add('opacity-0');
            document.getElementById('modal-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('modal-nueva').classList.add('hidden'), 300);
        }

        function adaptarFormulario(tipo) {
            const div = document.getElementById('div-fecha');
            if (['BAJA_DIAGRAMA', 'CERTIFICACION_UNIDAD', 'EXAMEN_CHOFER'].includes(tipo)) {
                div.classList.remove('hidden'); document.getElementById('input-fecha').required = true;
            } else { div.classList.add('hidden'); document.getElementById('input-fecha').required = false; }
        }

        function enviarNovedad(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span>`;
            
            const payload = {
                nom: document.getElementById('input-nom').value.toUpperCase(),
                tractor: document.getElementById('input-tractor').value.toUpperCase(),
                srv: document.getElementById('input-srv').value,
                n_ute: document.getElementById('input-ute').value || 'S/D',
                tipo_novedad: document.getElementById('input-tipo').value,
                fecha_objetivo: document.getElementById('input-fecha').value,
                detalle: document.getElementById('input-detalle').value
            };

            fetch(`${API_URL}/api/novedades/actualizar`, {
                method: 'POST', headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: 'nueva', payload })
            }).then(() => {
                cerrarModalNueva(); e.target.reset(); document.getElementById('div-fecha').classList.add('hidden');
            }).finally(() => { btn.innerHTML = "PUBLICAR NOVEDAD"; });
        }
    </script>
</body>
</html>
